<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ page.title }}</title>
<link rel="stylesheet" href="/assets/style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>
function showSection(id) {
  var sections = document.getElementsByClassName("content-section");
  for (var i = 0; i < sections.length; i++) {
    sections[i].style.display = "none";
  }
  document.getElementById(id).style.display = "block";
}
window.onload = function() {
  showSection("about");
}
</script>
</head>

<body>

<div class="container">

<div class="sidebar">
  <h2>Sivaramakrishnan M</h2>
  <p>Final Year B.Com., LL.B. (Hons.)<br>CS Executive Qualified</p>

  <button onclick="showSection('about')">About</button>
  <button onclick="showSection('education')">Education</button>
  <button onclick="showSection('internships')">Internships</button>
  <button onclick="showSection('publications')">Publications</button>
  <button onclick="showSection('conferences')">Conferences</button>
  <button onclick="showSection('certifications')">Certifications</button>
  <button onclick="showSection('skills')">Key Skills</button>

  <div class="quick-links">
    <h3>Quick Links</h3>
    <a href="mailto:muthuramansivaramakrishnan@gmail.com">Email</a>
    <a href="https://www.linkedin.com/in/sivaramakrishnan-muthuraman-799081295" target="_blank">LinkedIn</a>
  </div>
</div>

<div class="main-content">
  {{ content }}
</div>

</div>

</body>
</html>
